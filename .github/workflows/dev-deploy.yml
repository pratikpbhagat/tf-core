name: Deploy to Dev

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: true  # Latest push wins

jobs:
  # ── 1. Run DB migrations ─────────────────────────────────────────────────────
  migrate:
    name: DB Migrations (Dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to dev
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          cd packages/db
          supabase link --project-ref ${{ secrets.DEV_SUPABASE_PROJECT_REF }}
          supabase db push --linked
          echo "✓ Migrations applied to dev"

  # ── 2. Deploy frontend ────────────────────────────────────────────────────────
  deploy-vercel:
    name: Vercel Dev Deploy
    runs-on: ubuntu-latest
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to dev
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}

  # ── 3. Summary ────────────────────────────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [migrate, deploy-vercel]
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "## Dev Deployment"
          echo "Commit:  ${{ github.sha }}"
          echo "Migrate: ${{ needs.migrate.result }}"
          echo "Vercel:  ${{ needs.deploy-vercel.result }}"
